<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Farm.er Connect — Live Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #1B5E20;
            --primary-light: #2E7D32;
            --primary-dark: #0D3B10;
            --secondary: #F9A825;
            --secondary-light: #FDD835;
            --accent: #E65100;
            --accent-light: #FF6D00;
            --dark: #1A1A2E;
            --light: #F5F5F0;
            --white: #FFFFFF;
            --gray: #6B7280;
            --gray-light: #E8E8E3;
            --success: #00C853;
            --warning: #FFD600;
            --danger: #FF1744;
            --info: #00B0FF;
            --shadow: 0 2px 8px rgba(0,0,0,0.08);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.12);
            --shadow-lg: 0 8px 32px rgba(0,0,0,0.16);
            --radius: 12px;
            --radius-sm: 8px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--light);
            color: var(--dark);
            line-height: 1.5;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--primary-light); border-radius: 3px; }

        /* Animations */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideIn { from { transform: translateX(-20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        @keyframes truckMove { 0% { left: 10%; } 50% { left: 60%; } 100% { left: 85%; } }

        .animate-fade { animation: fadeIn 0.4s ease forwards; }
        .animate-slide { animation: slideIn 0.4s ease forwards; }
        .animate-shake { animation: shake 0.4s ease; }

        /* Buttons */
        .btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem;
            padding: 0.75rem 1.5rem; border-radius: var(--radius-sm); border: none;
            font-weight: 600; font-size: 0.9rem; cursor: pointer; transition: all 0.2s;
            font-family: inherit; white-space: nowrap;
        }
        .btn:active { transform: scale(0.96); }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-light); box-shadow: 0 4px 12px rgba(27,94,32,0.3); }
        .btn-secondary { background: var(--secondary); color: var(--dark); }
        .btn-secondary:hover { background: var(--secondary-light); }
        .btn-accent { background: var(--accent); color: white; }
        .btn-accent:hover { background: var(--accent-light); }
        .btn-outline { background: transparent; border: 2px solid var(--primary); color: var(--primary); }
        .btn-outline:hover { background: var(--primary); color: white; }
        .btn-ghost { background: transparent; color: var(--gray); }
        .btn-ghost:hover { background: var(--gray-light); color: var(--dark); }
        .btn-sm { padding: 0.5rem 1rem; font-size: 0.8rem; }
        .btn-lg { padding: 1rem 2rem; font-size: 1rem; }
        .btn-block { width: 100%; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Forms */
        .form-group { margin-bottom: 1.25rem; }
        .form-label { display: block; font-weight: 600; font-size: 0.85rem; margin-bottom: 0.4rem; color: var(--dark); }
        .form-input, .form-select, .form-textarea {
            width: 100%; padding: 0.75rem 1rem; border: 2px solid var(--gray-light);
            border-radius: var(--radius-sm); font-family: inherit; font-size: 0.95rem;
            transition: all 0.2s; background: white;
        }
        .form-input:focus, .form-select:focus, .form-textarea:focus {
            outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(27,94,32,0.1);
        }
        .form-textarea { min-height: 100px; resize: vertical; }
        .form-hint { font-size: 0.8rem; color: var(--gray); margin-top: 0.3rem; }
        .input-error { border-color: var(--danger) !important; }
        .error-text { color: var(--danger); font-size: 0.8rem; margin-top: 0.3rem; }

        /* Cards */
        .card {
            background: white; border-radius: var(--radius); padding: 1.5rem;
            box-shadow: var(--shadow); transition: all 0.2s;
        }
        .card:hover { box-shadow: var(--shadow-md); }
        .card-hover:hover { transform: translateY(-3px); }

        /* Badges */
        .badge {
            display: inline-flex; align-items: center; gap: 0.25rem;
            padding: 0.25rem 0.75rem; border-radius: 20px; font-size: 0.75rem;
            font-weight: 600; white-space: nowrap;
        }
        .badge-success { background: rgba(0,200,83,0.1); color: var(--success); }
        .badge-warning { background: rgba(255,214,0,0.15); color: #B29500; }
        .badge-danger { background: rgba(255,23,68,0.1); color: var(--danger); }
        .badge-info { background: rgba(0,176,255,0.1); color: var(--info); }
        .badge-primary { background: rgba(27,94,32,0.1); color: var(--primary); }

        /* Toast Notifications */
        .toast-container {
            position: fixed; top: 80px; right: 20px; z-index: 10000;
            display: flex; flex-direction: column; gap: 0.5rem; max-width: 320px;
        }
        .toast {
            background: white; padding: 1rem 1.25rem; border-radius: var(--radius-sm);
            box-shadow: var(--shadow-lg); display: flex; align-items: center; gap: 0.75rem;
            animation: slideIn 0.3s ease; border-left: 4px solid var(--primary);
            font-size: 0.9rem; font-weight: 500;
        }
        .toast-success { border-left-color: var(--success); }
        .toast-error { border-left-color: var(--danger); }
        .toast-warning { border-left-color: var(--warning); }
        .toast i { font-size: 1.1rem; }
        .toast-success i { color: var(--success); }
        .toast-error i { color: var(--danger); }
        .toast-warning i { color: var(--warning); }

        /* Modal */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.5);
            display: flex; align-items: center; justify-content: center;
            z-index: 9999; padding: 1rem; opacity: 0; pointer-events: none;
            transition: opacity 0.3s;
        }
        .modal-overlay.active { opacity: 1; pointer-events: all; }
        .modal {
            background: white; border-radius: var(--radius); width: 100%; max-width: 500px;
            max-height: 90vh; overflow-y: auto; box-shadow: var(--shadow-lg);
            transform: scale(0.95); transition: transform 0.3s;
        }
        .modal-overlay.active .modal { transform: scale(1); }
        .modal-header {
            padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--gray-light);
            display: flex; justify-content: space-between; align-items: center;
        }
        .modal-header h3 { font-size: 1.1rem; font-weight: 700; }
        .modal-close { background: none; border: none; font-size: 1.25rem; cursor: pointer; color: var(--gray); }
        .modal-close:hover { color: var(--danger); }
        .modal-body { padding: 1.5rem; }
        .modal-footer {
            padding: 1rem 1.5rem; border-top: 1px solid var(--gray-light);
            display: flex; justify-content: flex-end; gap: 0.75rem;
        }

        /* Layout */
        .app-container { display: none; min-height: 100vh; }
        .app-container.active { display: flex; }

        /* Auth Pages */
        .auth-page {
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, var(--primary-dark), var(--primary));
            padding: 1rem;
        }
        .auth-box {
            background: white; border-radius: var(--radius); padding: 2.5rem;
            width: 100%; max-width: 480px; box-shadow: var(--shadow-lg); animation: fadeIn 0.5s ease;
        }
        .auth-logo {
            text-align: center; margin-bottom: 2rem;
            font-family: 'Playfair Display', serif; font-size: 1.75rem; font-weight: 800;
            color: var(--primary); display: flex; align-items: center; justify-content: center; gap: 0.5rem;
        }
        .auth-logo i { color: var(--secondary); }
        .auth-tabs {
            display: flex; gap: 0.5rem; margin-bottom: 1.5rem;
            background: var(--gray-light); padding: 0.25rem; border-radius: var(--radius-sm);
        }
        .auth-tab {
            flex: 1; padding: 0.6rem; border: none; background: none; cursor: pointer;
            font-weight: 600; font-size: 0.9rem; border-radius: 6px; transition: all 0.2s;
            font-family: inherit;
        }
        .auth-tab.active { background: white; color: var(--primary); box-shadow: var(--shadow); }
        .role-selector {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.75rem; margin-bottom: 1.25rem;
        }
        .role-option {
            border: 2px solid var(--gray-light); border-radius: var(--radius-sm); padding: 1rem 0.5rem;
            text-align: center; cursor: pointer; transition: all 0.2s;
        }
        .role-option:hover { border-color: var(--primary-light); background: rgba(27,94,32,0.03); }
        .role-option.selected { border-color: var(--primary); background: rgba(27,94,32,0.05); }
        .role-option i { font-size: 1.5rem; margin-bottom: 0.5rem; display: block; }
        .role-option.farmer i { color: var(--primary); }
        .role-option.vendor i { color: var(--secondary); }
        .role-option.transporter i { color: var(--accent); }
        .role-option span { font-size: 0.8rem; font-weight: 600; display: block; }

        /* Sidebar Navigation */
        .sidebar {
            width: 260px; background: var(--dark); color: white;
            display: flex; flex-direction: column; position: fixed; height: 100vh;
            z-index: 100; transition: transform 0.3s; overflow-y: auto;
        }
        .sidebar-header {
            padding: 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .sidebar-brand {
            font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: 800;
            display: flex; align-items: center; gap: 0.5rem; color: white; text-decoration: none;
        }
        .sidebar-brand i { color: var(--secondary); }
        .sidebar-user {
            display: flex; align-items: center; gap: 0.75rem; margin-top: 1.25rem;
            padding: 0.75rem; background: rgba(255,255,255,0.05); border-radius: var(--radius-sm);
        }
        .user-avatar {
            width: 40px; height: 40px; border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-light), var(--secondary));
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 0.9rem; color: white; flex-shrink: 0;
        }
        .user-info { overflow: hidden; }
        .user-name { font-weight: 600; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .user-role { font-size: 0.75rem; opacity: 0.7; text-transform: capitalize; }
        .sidebar-nav { flex: 1; padding: 1rem 0; }
        .nav-item {
            display: flex; align-items: center; gap: 0.75rem;
            padding: 0.85rem 1.5rem; cursor: pointer; transition: all 0.2s;
            border-left: 3px solid transparent; text-decoration: none; color: rgba(255,255,255,0.7);
            font-size: 0.9rem; font-weight: 500;
        }
        .nav-item:hover { background: rgba(255,255,255,0.05); color: white; }
        .nav-item.active { background: rgba(255,255,255,0.08); color: white; border-left-color: var(--secondary); }
        .nav-item i { width: 20px; text-align: center; }
        .sidebar-footer { padding: 1rem 1.5rem; border-top: 1px solid rgba(255,255,255,0.1); }

        /* Main Content */
        .main-content {
            flex: 1; margin-left: 260px; min-height: 100vh; display: flex; flex-direction: column;
        }
        .topbar {
            height: 64px; background: white; border-bottom: 1px solid var(--gray-light);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 2rem; position: sticky; top: 0; z-index: 50;
        }
        .topbar-title { font-size: 1.25rem; font-weight: 700; color: var(--dark); }
        .topbar-actions { display: flex; align-items: center; gap: 1rem; }
        .icon-btn {
            width: 40px; height: 40px; border-radius: 50%; border: none; background: var(--light);
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            color: var(--gray); transition: all 0.2s; position: relative;
        }
        .icon-btn:hover { background: var(--gray-light); color: var(--dark); }
        .icon-btn .notif-dot {
            position: absolute; top: 2px; right: 2px; width: 10px; height: 10px;
            background: var(--danger); border-radius: 50%; border: 2px solid white;
        }

        .page-content { padding: 2rem; flex: 1; }
        .page { display: none; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }

        /* Stats Grid */
        .stats-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1.25rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: white; border-radius: var(--radius); padding: 1.5rem;
            box-shadow: var(--shadow); border: 1px solid var(--gray-light);
        }
        .stat-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.75rem; }
        .stat-icon {
            width: 44px; height: 44px; border-radius: var(--radius-sm);
            display: flex; align-items: center; justify-content: center; font-size: 1.1rem;
        }
        .stat-icon.green { background: rgba(0,200,83,0.1); color: var(--success); }
        .stat-icon.blue { background: rgba(0,176,255,0.1); color: var(--info); }
        .stat-icon.orange { background: rgba(230,81,0,0.1); color: var(--accent); }
        .stat-icon.yellow { background: rgba(249,168,37,0.1); color: #B29500; }
        .stat-value { font-size: 1.75rem; font-weight: 800; color: var(--dark); }
        .stat-label { font-size: 0.85rem; color: var(--gray); margin-top: 0.25rem; }
        .stat-trend { font-size: 0.8rem; margin-top: 0.5rem; font-weight: 600; }
        .stat-trend.up { color: var(--success); }
        .stat-trend.down { color: var(--danger); }

        /* Content Cards */
        .content-header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: gap;
        }
        .content-header h2 { font-size: 1.25rem; font-weight: 700; }
        .search-box {
            position: relative; max-width: 300px; width: 100%;
        }
        .search-box i {
            position: absolute; left: 1rem; top: 50%; transform: translateY(-50%);
            color: var(--gray); font-size: 0.9rem;
        }
        .search-box input {
            width: 100%; padding: 0.6rem 1rem 0.6rem 2.5rem; border: 2px solid var(--gray-light);
            border-radius: var(--radius-sm); font-family: inherit; font-size: 0.9rem;
        }
        .search-box input:focus { outline: none; border-color: var(--primary); }

        /* Produce Grid */
        .produce-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1.25rem;
        }
        .produce-card {
            background: white; border-radius: var(--radius); overflow: hidden;
            box-shadow: var(--shadow); border: 1px solid var(--gray-light);
            transition: all 0.2s; display: flex; flex-direction: column;
        }
        .produce-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-md); }
        .produce-image {
            height: 160px; background: linear-gradient(135deg, var(--primary-light), var(--primary));
            display: flex; align-items: center; justify-content: center; font-size: 3.5rem;
            position: relative;
        }
        .produce-image .produce-badge {
            position: absolute; top: 0.75rem; right: 0.75rem;
        }
        .produce-details { padding: 1.25rem; flex: 1; display: flex; flex-direction: column; }
        .produce-title { font-weight: 700; font-size: 1.05rem; margin-bottom: 0.25rem; }
        .produce-farmer { font-size: 0.8rem; color: var(--gray); margin-bottom: 0.5rem; }
        .produce-price { font-size: 1.3rem; font-weight: 800; color: var(--primary); margin-bottom: 0.5rem; }
        .produce-price span { font-size: 0.85rem; font-weight: 500; color: var(--gray); }
        .produce-meta { display: flex; gap: 1rem; font-size: 0.8rem; color: var(--gray); margin-bottom: 1rem; }
        .produce-meta span { display: flex; align-items: center; gap: 0.3rem; }
        .produce-actions { margin-top: auto; display: flex; gap: 0.5rem; }
        .produce-actions .btn { flex: 1; }

        /* Order Cards */
        .order-list { display: flex; flex-direction: column; gap: 1rem; }
        .order-card {
            background: white; border-radius: var(--radius); padding: 1.25rem;
            box-shadow: var(--shadow); border: 1px solid var(--gray-light);
            display: flex; justify-content: space-between; align-items: center; gap: 1rem; flex-wrap: wrap;
        }
        .order-info h4 { font-weight: 700; margin-bottom: 0.25rem; }
        .order-info p { font-size: 0.85rem; color: var(--gray); }
        .order-meta { text-align: right; }
        .order-meta .order-price { font-size: 1.2rem; font-weight: 800; color: var(--primary); }
        .order-status { margin-top: 0.5rem; }

        /* Transport Cards */
        .transport-card {
            background: white; border-radius: var(--radius); padding: 1.5rem;
            box-shadow: var(--shadow); border: 1px solid var(--gray-light);
            margin-bottom: 1rem; transition: all 0.2s;
        }
        .transport-card:hover { border-color: var(--primary-light); }
        .transport-route {
            display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem;
        }
        .route-point { text-align: center; }
        .route-point .city { font-weight: 700; font-size: 1rem; }
        .route-point .time { font-size: 0.8rem; color: var(--gray); }
        .route-arrow { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; }
        .route-arrow::before {
            content: ''; position: absolute; height: 2px; background: var(--gray-light); left: 0; right: 0;
        }
        .route-arrow i { background: white; padding: 0 0.5rem; color: var(--primary); position: relative; z-index: 2; }
        .transport-details {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem;
            padding: 1rem 0; border-top: 1px solid var(--gray-light); border-bottom: 1px solid var(--gray-light);
            margin-bottom: 1rem;
        }
        .detail-item { text-align: center; }
        .detail-item .label { font-size: 0.75rem; color: var(--gray); text-transform: uppercase; letter-spacing: 0.05em; }
        .detail-item .value { font-weight: 700; font-size: 1rem; margin-top: 0.25rem; }

        /* Tracking */
        .tracking-map {
            background: linear-gradient(135deg, #E8F5E9, #C8E6C9); border-radius: var(--radius);
            height: 280px; position: relative; overflow: hidden; margin-bottom: 1.5rem;
        }
        .map-road {
            position: absolute; top: 50%; left: 5%; right: 5%; height: 4px;
            background: white; border-radius: 2px; transform: translateY(-50%);
        }
        .map-stop {
            position: absolute; top: 50%; width: 24px; height: 24px;
            background: var(--primary); border-radius: 50%; border: 4px solid white;
            box-shadow: var(--shadow); transform: translate(-50%, -50%); z-index: 2;
        }
        .map-stop.start { left: 5%; }
        .map-stop.end { left: 95%; }
        .map-truck {
            position: absolute; top: 42%; width: 36px; height: 36px;
            background: var(--secondary); border-radius: 50%; border: 3px solid white;
            box-shadow: var(--shadow-md); display: flex; align-items: center; justify-content: center;
            color: var(--dark); font-size: 0.85rem; z-index: 3;
            animation: truckMove 8s ease-in-out infinite;
        }
        .map-label {
            position: absolute; bottom: 1rem; left: 50%; transform: translateX(-50%);
            background: white; padding: 0.5rem 1rem; border-radius: 20px;
            box-shadow: var(--shadow); font-weight: 600; font-size: 0.9rem; color: var(--primary);
        }
        .timeline {
            position: relative; padding-left: 2rem;
        }
        .timeline::before {
            content: ''; position: absolute; left: 0.5rem; top: 0; bottom: 0;
            width: 2px; background: var(--gray-light);
        }
        .timeline-item { position: relative; padding-bottom: 1.5rem; }
        .timeline-item::before {
            content: ''; position: absolute; left: -1.85rem; top: 0.25rem;
            width: 14px; height: 14px; border-radius: 50%; background: var(--gray-light);
            border: 3px solid white; box-shadow: 0 0 0 2px var(--gray-light);
        }
        .timeline-item.completed::before { background: var(--success); box-shadow: 0 0 0 2px var(--success); }
        .timeline-item.active::before { background: var(--secondary); box-shadow: 0 0 0 2px var(--secondary); animation: pulse 2s infinite; }
        .timeline-item h4 { font-size: 0.95rem; font-weight: 700; margin-bottom: 0.2rem; }
        .timeline-item p { font-size: 0.85rem; color: var(--gray); }
        .timeline-item .time { font-size: 0.75rem; color: var(--gray); margin-top: 0.2rem; }

        /* Tables */
        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th, .data-table td { padding: 0.875rem 1rem; text-align: left; font-size: 0.9rem; }
        .data-table th { font-weight: 600; color: var(--gray); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 2px solid var(--gray-light); }
        .data-table td { border-bottom: 1px solid var(--gray-light); }
        .data-table tr:hover td { background: rgba(27,94,32,0.02); }

        /* Empty State */
        .empty-state { text-align: center; padding: 3rem; }
        .empty-state i { font-size: 3rem; color: var(--gray-light); margin-bottom: 1rem; }
        .empty-state h3 { font-size: 1.1rem; color: var(--gray); margin-bottom: 0.5rem; }
        .empty-state p { font-size: 0.9rem; color: var(--gray); margin-bottom: 1rem; }

        /* Mobile */
        .mobile-toggle {
            display: none; background: none; border: none; font-size: 1.25rem; cursor: pointer; color: var(--dark);
        }
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .main-content { margin-left: 0; }
            .mobile-toggle { display: block; }

        /* Notifications Panel */

<body>

                <button class="auth-tab active" onclick="switchAuthTab('login')">Sign In</button>
                <button class="auth-tab" onclick="switchAuthTab('register')">Get Started</button>

            <!-- Login Form -->
            <form id="loginForm" onsubmit="handleLogin(event)">

                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-input" id="loginEmail" placeholder="you@example.com" required>

                <p class="text-center mt-1" style="font-size: 0.85rem; color: var(--gray);">
                    Demo accounts: <span class="text-primary" style="cursor: pointer;" onclick="fillDemo('farmer')">Farmer</span> • 
                    <span class="text-primary" style="cursor: pointer;" onclick="fillDemo('vendor')">Vendor</span> • 
                    <span class="text-primary" style="cursor: pointer;" onclick="fillDemo('transporter')">Transporter</span>
                </p>
            </form>

            <!-- Register Form -->
            <form id="registerForm" class="hidden" onsubmit="handleRegister(event)">

                    <label class="form-label">Full Name</label>

                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-input" id="regEmail" placeholder="you@example.com" required>

                            <span>Farmer</span>
                        </div>
                        <div class="role-option vendor" onclick="selectRole('vendor')" data-role="vendor">

    <!-- Main App -->

    <script>
        // ==================== DATA STORE (Simulated Backend) ====================
        const Store = {
            users: JSON.parse(localStorage.getItem('fc_users')) || [],
            produce: JSON.parse(localStorage.getItem('fc_produce')) || [],
            orders: JSON.parse(localStorage.getItem('fc_orders')) || [],
            transports: JSON.parse(localStorage.getItem('fc_transports')) || [],
            notifications: JSON.parse(localStorage.getItem('fc_notifications')) || [],
            cart: JSON.parse(localStorage.getItem('fc_cart')) || [],
            currentUser: JSON.parse(localStorage.getItem('fc_currentUser')) || null,

            save() {
                localStorage.setItem('fc_users', JSON.stringify(this.users));
                localStorage.setItem('fc_produce', JSON.stringify(this.produce));
                localStorage.setItem('fc_orders', JSON.stringify(this.orders));
                localStorage.setItem('fc_transports', JSON.stringify(this.transports));
                localStorage.setItem('fc_notifications', JSON.stringify(this.notifications));
                localStorage.setItem('fc_cart', JSON.stringify(this.cart));
                if (this.currentUser) localStorage.setItem('fc_currentUser', JSON.stringify(this.currentUser));
            },

            initDemoData() {
                if (this.users.length === 0) {
                    // Demo Farmer
                    const farmer = {
                        id: 'farmer_1', name: 'James Mwangi', email: 'farmer@demo.com',
                        phone: '+254712345678', location: 'Kiambu, Kenya', role: 'farmer',
                        password: 'demo123', avatar: 'JM', createdAt: new Date().toISOString()
                    };
                    // Demo Vendor
                    const vendor = {

                    const transporter = {

                        password: 'demo123', avatar: 'PK', vehicle: 'Isuzu FRR Truck', capacity: '5000kg',
                        createdAt: new Date().toISOString()
                    };
                    this.users = [farmer, vendor, transporter];

                    // Demo Produce
                    this.produce = [
                        { id: 'p1', farmerId: 'farmer_1', farmerName: 'James Mwangi', farmerLocation: 'Kiambu, Kenya',
                          title: 'Fresh Tomatoes', category: 'vegetables', emoji: '🍅', grade: 'A',
                          price: 45, unit: 'kg', quantity: 500, available: 320,
                          description: 'Vine-ripened red tomatoes, harvested this morning. Perfect for salads and cooking.',
                          freshness: '2 days', status: 'available', createdAt: new Date().toISOString() },
                        { id: 'p2', farmerId: 'farmer_1', farmerName: 'James Mwangi', farmerLocation: 'Kiambu, Kenya',
                          title: 'Sukuma Wiki', category: 'vegetables', emoji: '🥬', grade: 'A',
                          price: 25, unit: 'bunch', quantity: 200, available: 150,
                          description: 'Organic kale, pesticide-free. Very fresh and green.',
                          freshness: 'Today', status: 'available', createdAt: new Date().toISOString() },
                        { id: 'p3', farmerId: 'farmer_1', farmerName: 'James Mwangi', farmerLocation: 'Kiambu, Kenya',
                          title: 'Carrots', category: 'vegetables', emoji: '🥕', grade: 'B',
                          price: 35, unit: 'kg', quantity: 100, available: 45,
                          description: 'Sweet orange carrots, good size for cooking.',
                          freshness: '3 days', status: 'available', createdAt: new Date().toISOString() },
                        { id: 'p4', farmerId: 'farmer_1', farmerName: 'James Mwangi', farmerLocation: 'Kiambu, Kenya',
                          title: 'Red Onions', category: 'vegetables', emoji: '🧅', grade: 'A',
                          price: 60, unit: 'kg', quantity: 80, available: 80,
                          description: 'Large red onions, perfect for stews and salads.',
                          freshness: '5 days', status: 'available', createdAt: new Date().toISOString() },
                        { id: 'p5', farmerId: 'farmer_1', farmerName: 'James Mwangi', farmerLocation: 'Kiambu, Kenya',
                          title: 'Bananas', category: 'fruits', emoji: '🍌', grade: 'A',
                          price: 15, unit: 'kg', quantity: 1000, available: 600,
                          description: 'Cavendish bananas, ripe and ready to eat.',
                          freshness: '2 days', status: 'available', createdAt: new Date().toISOString() },
                        { id: 'p6', farmerId: 'farmer_1', farmerName: 'James Mwangi', farmerLocation: 'Kiambu, Kenya',
                          title: 'Strawberries', category: 'fruits', emoji: '🍓', grade: 'A',
                          price: 120, unit: 'punnet', quantity: 50, available: 30,
                          description: 'Sweet strawberries from Nanyuki highlands. Cold chain required.',
                          freshness: '1 day', status: 'available', createdAt: new Date().toISOString() }
                    ];

                    // Demo Orders
                    this.orders = [
                        { id: 'o1', vendorId: 'vendor_1', vendorName: 'Amina Okafor', farmerId: 'farmer_1',
                          items: [{ produceId: 'p1', title: 'Fresh Tomatoes', qty: 50, price: 45, total: 2250 }],
                          total: 2250, status: 'delivered', transportId: 'trans_1', transportStatus: 'completed',
                          createdAt: new Date(Date.now() - 86400000 * 2).toISOString(),
                          deliveryDate: new Date(Date.now() - 86400000).toISOString() },
                        { id: 'o2', vendorId: 'vendor_1', vendorName: 'Amina Okafor', farmerId: 'farmer_1',
                          items: [{ produceId: 'p2', title: 'Sukuma Wiki', qty: 30, price: 25, total: 750 }],

                          createdAt: new Date(Date.now() - 86400000 * 0.5).toISOString(),
                          deliveryDate: null }
                    ];

                    // Demo Transports
                    this.transports = [
                        { id: 't1', transporterId: 'trans_1', transporterName: 'Peter Kimani', vehicle: 'Isuzu FRR Truck',
                          from: 'Kiambu', to: 'Nairobi CBD', distance: 45, duration: '1h 20min',

                        { id: 't2', transporterId: 'trans_1', transporterName: 'Peter Kimani', vehicle: 'Isuzu FRR Truck (Cold Box)',
                          from: 'Nanyuki', to: 'Nairobi', distance: 200, duration: '3h 30min',
                          capacity: 3000, price: 12000, type: 'refrigerated', status: 'available',
                          produceType: 'fruits', rating: 4.9, trips: 89, createdAt: new Date().toISOString() },
                        { id: 't3', transporterId: 'trans_1', transporterName: 'Peter Kimani', vehicle: 'Isuzu FRR Truck',

        // ==================== APP STATE ====================
        let currentPage = 'dashboard';
        let selectedRole = '';

        // ==================== INITIALIZATION ====================
        document.addEventListener('DOMContentLoaded', () => {
            Store.initDemoData();
            setTimeout(() => {
                document.getElementById('loadingScreen').classList.add('hidden');
                if (Store.currentUser) {
                    showApp();
                } else {
                    showAuth();
                }
            }, 800);
        });

        // ==================== AUTH FUNCTIONS ====================
        function showAuth() {
            document.getElementById('authPage').style.display = 'flex';
            document.getElementById('appContainer').classList.remove('active');
        }

        function showApp() {
            document.getElementById('authPage').style.display = 'none';
            document.getElementById('appContainer').classList.add('active');
            updateUserUI();
            buildSidebar();
            navigateTo('dashboard');
            updateCartUI();
            updateNotifications();
        }

        function switchAuthTab(tab) {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            if (tab === 'login') {
                document.getElementById('loginForm').classList.remove('hidden');
                document.getElementById('registerForm').classList.add('hidden');
            } else {
                document.getElementById('loginForm').classList.add('hidden');
                document.getElementById('registerForm').classList.remove('hidden');
            }
        }

        function selectRole(role) {
            selectedRole = role;
            document.querySelectorAll('.role-option').forEach(o => o.classList.remove('selected'));
            document.querySelector(`.role-option[data-role="${role}"]`).classList.add('selected');
            document.getElementById('regRole').value = role;
            document.getElementById('roleError').classList.add('hidden');
        }

        function fillDemo(role) {
            const demos = {
                farmer: { email: 'farmer@demo.com', password: 'demo123' },
                vendor: { email: 'vendor@demo.com', password: 'demo123' },
                transporter: { email: 'transporter@demo.com', password: 'demo123' }
            };
            document.getElementById('loginEmail').value = demos[role].email;
            document.getElementById('loginPassword').value = demos[role].password;
            showToast('Demo credentials filled! Click Sign In', 'info');
        }

        function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            const user = Store.users.find(u => u.email === email && u.password === password);
            if (!user) {
                showToast('Invalid email or password', 'error');
                document.getElementById('loginForm').classList.add('animate-shake');
                setTimeout(() => document.getElementById('loginForm').classList.remove('animate-shake'), 400);
                return;
            }

            Store.currentUser = user;
            Store.save();
            showApp();
            showToast(`Welcome back, ${user.name}!`, 'success');
        }

        function handleRegister(e) {
            e.preventDefault();
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const phone = document.getElementById('regPhone').value;
            const location = document.getElementById('regLocation').value;
            const role = document.getElementById('regRole').value;
            const password = document.getElementById('regPassword').value;

            if (!role) {
                document.getElementById('roleError').classList.remove('hidden');
                return;
            }

            if (Store.users.find(u => u.email === email)) {
                showToast('Email already registered', 'error');
                return;
            }

            const user = {
                id: `user_${Date.now()}`, name, email, phone, location, role, password,
                avatar: name.split(' ').map(n => n[0]).join('').toUpperCase(),
                createdAt: new Date().toISOString()
            };

            Store.users.push(user);
            Store.currentUser = user;
            Store.save();
            showApp();
            showToast('Account created successfully!', 'success');
        }

        function logout() {
            Store.currentUser = null;
            localStorage.removeItem('fc_currentUser');
            Store.cart = [];
            Store.save();
            showAuth();
            showToast('Signed out successfully', 'info');
        }

        // ==================== UI UPDATES ====================
        function updateUserUI() {
            const user = Store.currentUser;
            document.getElementById('userName').textContent = user.name;
            document.getElementById('userRole').textContent = user.role;
            document.getElementById('userAvatar').textContent = user.avatar;
        }

            const nav = document.getElementById('sidebarNav');

            const menus = {

            currentPage = page;

            const titles = {
                dashboard: 'Dashboard', 'my-produce': 'My Produce', orders: 'Orders',
                'market-prices': 'Market Prices', transport: 'Find Transport', messages: 'Messages',
                marketplace: 'Marketplace', tracking: 'Track Delivery', suppliers: 'My Suppliers',
                loads: 'Available Loads', 'my-jobs': 'My Jobs', earnings: 'Earnings', vehicle: 'My Vehicle'
            };
            document.getElementById('pageTitle').textContent = titles[page] || page;

            // Close mobile sidebar
            document.getElementById('sidebar').classList.remove('open');

            renderPage(page);

                    'my-jobs': renderMyJobs,
                    earnings: renderEarnings,
                    vehicle: renderVehicle,
                    messages: renderMessages
                }
            };

            const renderer = renderers[role]?.[page];
            if (renderer) {
                container.innerHTML = renderer();
                attachPageListeners(page);
            }
        }

        function handleAddProduce(e) {
            e.preventDefault();
            const user = Store.currentUser;
            const emojis = { vegetables: '🥬', fruits: '🍎', grains: '🌾', dairy: '🥛', other: '📦' };

            const produce = {
                id: `p_${Date.now()}`,
                farmerId: user.id,
                farmerName: user.name,
                farmerLocation: user.location,
                title: document.getElementById('prodTitle').value,
                category: document.getElementById('prodCategory').value,
                emoji: emojis[document.getElementById('prodCategory').value] || '📦',
                grade: document.getElementById('prodGrade').value,
                price: parseInt(document.getElementById('prodPrice').value),
                unit: document.getElementById('prodUnit').value,
                quantity: parseInt(document.getElementById('prodQty').value),
                available: parseInt(document.getElementById('prodQty').value),
                description: document.getElementById('prodDesc').value,
                freshness: 'Today',
                status: 'available',
                createdAt: new Date().toISOString()
            };

            Store.produce.push(produce);
            Store.save();
            closeModal();
            showToast('Produce listed successfully!', 'success');
            navigateTo('my-produce');
        }

        function deleteProduce(id) {
            if (!confirm('Are you sure you want to delete this listing?')) return;
            Store.produce = Store.produce.filter(p => p.id !== id);
            Store.save();
            showToast('Listing deleted', 'success');
            navigateTo('my-produce');
        }

                dairy: light ? '#4FC3F7' : '#0288D1',
                other: light ? '#BDBDBD' : '#757575'

            return colors[cat] || colors.other;

                    <input type="number" class="form-input" id="detailQty" value="10" min="1" max="${p.available}">
                </div>
            `, `
                <button class="btn btn-ghost" onclick="closeModal()">Close</button>
                <button class="btn btn-primary" onclick="addToCartFromModal('${p.id}')">
                    <i class="fas fa-cart-plus"></i> Add to Cart
                </button>

        function addToCartFromModal(id) {
            const qty = parseInt(document.getElementById('detailQty').value) || 1;
            addToCart(id, qty);
            closeModal();
        }

        // ==================== CART FUNCTIONS ====================
        function addToCart(produceId, qty) {
            const p = Store.produce.find(x => x.id === produceId);
            if (!p) return;

            const existing = Store.cart.find(item => item.produceId === produceId);
            if (existing) {
                existing.qty += qty;
            } else {
                Store.cart.push({
                    produceId: p.id,
                    title: p.title,
                    price: p.price,
                    unit: p.unit,
                    qty: qty,
                    farmerId: p.farmerId,
                    farmerName: p.farmerName,
                    emoji: p.emoji
                });
            }
            Store.save();
            updateCartUI();
            showToast(`${p.title} added to cart`, 'success');
        }

        function updateCartUI() {
            const cartBody = document.getElementById('cartBody');
            const cartFooter = document.getElementById('cartFooter');
            const cartDot = document.getElementById('cartDot');

            if (Store.cart.length === 0) {
                cartBody.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-shopping-basket"></i>
                        <h3>Cart is empty</h3>
                        <p>Browse produce and add items to your cart</p>
                    </div>
                `;
                cartFooter.style.display = 'none';
                cartDot.classList.add('hidden');
            } else {
                cartDot.classList.remove('hidden');
                cartFooter.style.display = 'block';

                cartBody.innerHTML = Store.cart.map(item => `
                    <div class="cart-item">
                        <div class="cart-item-img">${item.emoji}</div>
                        <div class="cart-item-details">
                            <div class="cart-item-title">${item.title}</div>
                            <div class="cart-item-price">KES ${item.price} / ${item.unit}</div>
                            <div class="cart-item-qty">
                                <button class="qty-btn" onclick="updateCartQty('${item.produceId}', -1)">-</button>
                                <span>${item.qty}</span>
                                <button class="qty-btn" onclick="updateCartQty('${item.produceId}', 1)">+</button>
                            </div>
                        </div>
                        <button class="btn btn-ghost btn-sm" onclick="removeFromCart('${item.produceId}')">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                `).join('');

                const total = Store.cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
                document.getElementById('cartTotal').textContent = `KES ${total.toLocaleString()}`;
            }
        }

        function updateCartQty(produceId, delta) {
            const item = Store.cart.find(i => i.produceId === produceId);
            if (!item) return;
            item.qty += delta;
            if (item.qty <= 0) {
                Store.cart = Store.cart.filter(i => i.produceId !== produceId);
            }
            Store.save();
            updateCartUI();
        }

        function removeFromCart(produceId) {
            Store.cart = Store.cart.filter(i => i.produceId !== produceId);
            Store.save();
            updateCartUI();
            showToast('Item removed from cart', 'info');
        }

        function toggleCart() {
            document.getElementById('cartSidebar').classList.toggle('open');
            document.getElementById('cartOverlay').classList.toggle('active');
        }

        function checkout() {
            if (Store.cart.length === 0) return;

            const total = Store.cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
            const farmerId = Store.cart[0].farmerId;
            const farmerName = Store.cart[0].farmerName;

            showModal('Confirm Order', `
                <div style="text-align: center; margin-bottom: 1.5rem;">
                    <i class="fas fa-mobile-alt" style="font-size: 3rem; color: var(--primary);"></i>
                    <h3 style="margin-top: 1rem;">Pay with M-Pesa</h3>
                    <p style="color: var(--gray); font-size: 0.9rem;">You will receive an STK push on your phone</p>
                </div>
                <div class="card" style="margin-bottom: 1rem;">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
                        <span>Subtotal</span>
                        <span>KES ${total.toLocaleString()}</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
                        <span>Transport</span>
                        <span>KES 2,500</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; font-weight: 700; font-size: 1.1rem; border-top: 1px solid var(--gray-light); padding-top: 0.5rem;">
                        <span>Total</span>
                        <span>KES ${(total + 2500).toLocaleString()}</span>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">M-Pesa Number</label>
                    <input type="tel" class="form-input" value="${Store.currentUser.phone}" id="mpesaPhone">
                </div>
            `, `
                <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
                <button class="btn btn-primary" onclick="processPayment('${farmerId}', '${farmerName}', ${total})">
                    <i class="fas fa-lock"></i> Pay KES ${(total + 2500).toLocaleString()}
                </button>
            `);
        }

        function processPayment(farmerId, farmerName, total) {
            closeModal();
            toggleCart();

            // Simulate payment processing
            showToast('M-Pesa STK push sent to your phone...', 'info');

            setTimeout(() => {
                const order = {
                    id: `o_${Date.now()}`,
                    vendorId: Store.currentUser.id,
                    vendorName: Store.currentUser.name,
                    farmerId: farmerId,
                    items: Store.cart.map(item => ({
                        produceId: item.produceId,
                        title: item.title,
                        qty: item.qty,
                        price: item.price,
                        total: item.price * item.qty
                    })),
                    total: total + 2500,
                    status: 'pending',
                    transportId: null,
                    transportStatus: 'pending',
                    createdAt: new Date().toISOString(),
                    deliveryDate: null
                };

                Store.orders.push(order);

                // Update produce availability
                Store.cart.forEach(item => {
                    const p = Store.produce.find(x => x.id === item.produceId);
                    if (p) p.available -= item.qty;
                });

                // Add notification
                Store.notifications.unshift({
                    id: `n_${Date.now()}`,
                    userId: Store.currentUser.id,
                    title: 'Order Placed Successfully',
                    text: `Your order #${order.id.slice(-4).toUpperCase()} has been placed. Waiting for farmer confirmation.`,
                    time: 'Just now',
                    read: false
                });

                Store.cart = [];
                Store.save();
                updateCartUI();
                updateNotifications();
                showToast('Payment successful! Order placed.', 'success');
                navigateTo('orders');
            }, 2000);
        }

        function updateJobStatus(jobId, status) {
            const job = Store.transports.find(t => t.id === jobId);
            if (!job) return;

            if (status === 'delivered') {
                job.status = 'completed';
                // Find associated order and mark delivered
                const order = Store.orders.find(o => o.transportId === jobId || o.transportId === 'trans_1');
                if (order) {
                    order.status = 'delivered';
                    order.transportStatus = 'completed';
                }
                showToast('Delivery completed! Payment released to your M-Pesa.', 'success');
            } else {
                job.status = status;
                showToast(`Status updated to: ${status.replace('_', ' ')}`, 'success');
            }
            Store.save();
            navigateTo('my-jobs');
        }

        // ==================== NOTIFICATIONS ====================
        function toggleNotif() {
            document.getElementById('notifPanel').classList.toggle('active');
        }

        function updateNotifications() {
            const userNotifs = Store.notifications.filter(n => n.userId === Store.currentUser.id).slice(0, 5);
            const notifList = document.getElementById('notifList');
            const notifDot = document.getElementById('notifDot');

            if (userNotifs.length > 0) {
                notifDot.classList.remove('hidden');
                notifList.innerHTML = userNotifs.map(n => `
                    <div class="notif-item ${n.read ? '' : 'unread'}" onclick="markRead('${n.id}')">
                        <div class="notif-title">${n.title}</div>
                        <div class="notif-text">${n.text}</div>
                        <div class="notif-time"><i class="fas fa-clock"></i> ${n.time}</div>
                    </div>
                `).join('');
            } else {
                notifDot.classList.add('hidden');
                notifList.innerHTML = '<div style="padding: 1rem; text-align: center; color: var(--gray);">No notifications</div>';
            }
        }

        function markRead(id) {
            const n = Store.notifications.find(x => x.id === id);
            if (n) n.read = true;
            Store.save();
            updateNotifications();
        }

        // ==================== UTILITIES ====================
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            const icons = { success: 'fa-check-circle', error: 'fa-exclamation-circle', warning: 'fa-exclamation-triangle', info: 'fa-info-circle' };
            toast.innerHTML = `<i class="fas ${icons[type]}"></i> ${message}`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(100%)';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function showModal(title, body, footer) {
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalBody').innerHTML = body;
            document.getElementById('modalFooter').innerHTML = footer;
            document.getElementById('modalOverlay').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('active');
        }

        function formatStatus(status) {
            return status.replace(/_/g, ' ').replace(/\w/g, l => l.toUpperCase());
        }

        function getUnit(title) {
            const p = Store.produce.find(x => x.title === title);
            return p ? p.unit : 'units';
        }

        function attachPageListeners(page) {
            // Page-specific listeners can be added here
        }

        // Close modal on overlay click
        document.getElementById('modalOverlay').addEventListener('click', (e) => {
            if (e.target === document.getElementById('modalOverlay')) closeModal();
        });

        // Close notifications when clicking outside
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.icon-btn') && !e.target.closest('.notif-panel')) {
                document.getElementById('notifPanel').classList.remove('active');
            }
        });
